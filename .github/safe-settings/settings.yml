---
# Org-wide defaults applied to every repo by .github/workflows/safe-settings.yaml.
# Per-repo overrides live in .github/safe-settings/repos/<repo-name>.yml.
# Schema: https://github.com/github/safe-settings/blob/main/docs/sample-settings/settings.yml

repository:
  default_branch: main

  # Features
  has_issues: true
  has_projects: false
  has_wiki: false
  has_discussions: false
  has_downloads: false
  is_template: false

  # Pull requests
  allow_merge_commit: false
  allow_squash_merge: true
  squash_merge_commit_title: PR_TITLE
  squash_merge_commit_message: BLANK
  allow_rebase_merge: false
  allow_auto_merge: true
  allow_update_branch: true
  delete_branch_on_merge: true

  # NOTE: web_commit_signoff_required is enforced at the org level.
  # Don't set it here — the API rejects any per-repo PATCH on the field
  # (even setting it to the same value) when org enforcement is on.

labels:
  exclude:
    # Dynamic managed
    - name: ^app/
    # Labeler managed
    - name: ^area/
    # Release Please managed
    - name: "autorelease: pending"
    - name: "autorelease: tagged"
    - name: release-please:force-run

  include:
    # Issue classification
    - name: bug
      color: d73a4a
      description: Something isn't working
    - name: documentation
      color: 0075ca
      description: Improvements or additions to documentation
    - name: enhancement
      color: a2eeef
      description: New feature or request
    - name: question
      color: d876e3
      description: Further information is requested
    - name: wontfix
      color: ffffff
      description: This will not be worked on
    - name: do-not-merge
      color: ee0701
      description: Marks PR that is not (yet) in a mergeable state
    - name: stale
      color: c5def5
      description: Marked stale by automation due to inactivity

    # Semantic version types
    - name: type/digest
      color: ffec19
      description: Issue relates to a digest version bump
    - name: type/patch
      color: ffec19
      description: Issue relates to a patch version bump
    - name: type/minor
      color: ff9800
      description: Issue relates to a minor version bump
    - name: type/major
      color: f6412d
      description: Issue relates to a major version bump

    # Renovate manager types
    - name: renovate/container
      color: 027fa0
      description: Pull request updates a container image
    - name: renovate/github-action
      color: 027fa0
      description: Pull request updates a GitHub Action
    - name: renovate/github-release
      color: 027fa0
      description: Pull request updates a GitHub release
    - name: renovate/helm
      color: 027fa0
      description: Pull request updates a Helm chart
