---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Safe Settings

on:
  push:
    branches:
      - main
    paths:
      - .github/safe-settings/**
      - .github/workflows/safe-settings.yaml
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        type: boolean
        default: false

permissions:
  contents: read

env:
  # renovate: datasource=github-releases depName=github/safe-settings
  SAFE_SETTINGS_VERSION: 2.1.18
  SAFE_SETTINGS_DIR: ${{ github.workspace }}/.safe-settings

jobs:
  full-sync:
    name: Reconcile org repository settings
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout safe-settings
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: github/safe-settings
          ref: ${{ env.SAFE_SETTINGS_VERSION }}
          path: ${{ env.SAFE_SETTINGS_DIR }}
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
          install_args: --locked

      - name: Install safe-settings
        working-directory: ${{ env.SAFE_SETTINGS_DIR }}
        run: npm ci

      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-metadata: read

      # safe-settings PATCHes every installation repo it sees, including
      # archived ones (which the API rejects with 403). Generate a deployment
      # config that lists all currently-archived repos so safe-settings skips
      # them. Re-runs daily via the schedule pick up newly archived repos.
      - name: Generate deployment-settings.yml
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          {
            echo '---'
            echo 'restrictedRepos:'
            echo '  exclude:'
            echo '    - .github'
            echo '    - admin'
            echo '    - safe-settings'
            gh repo list "$OWNER" --limit 200 --json name,isArchived \
              --jq '.[] | select(.isArchived) | "    - " + .name'
          } > deployment-settings.yml
          cat deployment-settings.yml

      - name: Run safe-settings full-sync
        working-directory: ${{ env.SAFE_SETTINGS_DIR }}
        env:
          GH_ORG: ${{ github.repository_owner }}
          APP_ID: ${{ secrets.BOT_APP_ID }}
          PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          ADMIN_REPO: .github
          CONFIG_PATH: .github/safe-settings
          DEPLOYMENT_CONFIG_FILE: ${{ github.workspace }}/deployment-settings.yml
          FULL_SYNC_NOP: ${{ inputs.dryRun || 'false' }}
        run: npm run full-sync
