---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Reconcile
run-name: Reconcile${{ inputs.dryRun == true && ' (dry-run)' || '' }}

on:
  push:
    branches:
      - main
    paths:
      - reconcile/**
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        default: false
        required: false
        type: boolean
      repoFilter:
        description: Only reconcile these repositories (comma-separated)
        required: false

permissions:
  contents: read

concurrency:
  group: reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    name: Reconcile
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
          install_args: --locked

      - name: Install Dependencies
        working-directory: reconcile
        run: npm ci

      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-administration: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Reconcile
        working-directory: reconcile
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_ORG: ${{ github.repository_owner }}
          DRY_RUN: ${{ inputs.dryRun == true }}
          REPO_FILTER: ${{ inputs.repoFilter || '' }}
        run: npm run reconcile
